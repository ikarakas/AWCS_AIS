# ---------------------------------------------------------------------------
# GWS (Java) AIS relay configuration
# ---------------------------------------------------------------------------

# Output transport: udp (default) or tcp.
#   tcp -> GWS acts as a TCP server on dest.port; subscribers connect in.
mode.transport = udp

# TCP idle heartbeat: after this many ms with no AIS traffic, send a keepalive
# line ($GWSHB) so idle subscribers' inactivity watchdogs stay fed. 0 = off.
# Keep it below the receiver's idle timeout (mission_receiver tcp ... <idle_secs>).
tcp.heartbeatMillis = 3000

# UDP delivery: false = unicast, true = multicast (ignored when transport = tcp)
mode.multicast = false

# Destination:
#   unicast   -> the consumer's IP
#   multicast -> a group address in 224.0.0.0 - 239.255.255.255
dest.host = 127.0.0.1
dest.port = 4001

# Multicast egress settings (ignored in unicast mode)
multicast.interface =
multicast.ttl = 1

# Bounded queue policy (Capacity + TTL).
#   capacity  : max messages buffered before the OLDEST is dropped
#   ttlMillis : messages older than this are dropped at send time
queue.capacity = 1000
queue.ttlMillis = 5000

# Input source: file (replay, default) or serial (live character device / FIFO).
source.type = file
# Device / FIFO path, used only when source.type = serial. Simulate one on
# macOS/Linux with:  socat -d -d pty,raw,echo=0 pty,raw,echo=0
serial.device =

# Replay source (used when source.type = file; stands in for the serial AIS RX)
replay.file = ../data/sample_ais.nmea
replay.rate = 10
replay.loop = true

# Console stats cadence
stats.intervalMillis = 2000
